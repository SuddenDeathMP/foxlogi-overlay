<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Remote content is limited to item icons over https (img-src). All backend
         API traffic happens in the main process, never via renderer fetch, so no
         API origin needs to be allow-listed here. 'unsafe-inline' style is
         required by antd's CSS-in-JS; ws: covers Vite HMR in dev. -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data: http://127.0.0.1:* http://localhost:*; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:" />
    <title>Foxlogi Overlay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

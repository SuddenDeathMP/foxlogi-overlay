appId: com.foxlogi.overlay
productName: Foxlogi Overlay
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
asar: true

# Publish auto-updates via GitHub Releases (electron-updater).
publish:
  provider: github
  owner: SuddenDeathMP
  repo: foxlogi-overlay

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # Authenticode signing avoids SmartScreen warnings (set CSC_LINK / CSC_KEY_PASSWORD env vars).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  # Auto-update on macOS REQUIRES signing + notarization.
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  category: Utility
  target:
    - AppImage
    - deb
  maintainer: FoxholeLogistics
